<div class="enterprise-card p-6 flex flex-col h-full">
    <div class="flex items-start gap-4 mb-4">
        <div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0 text-blue-600">
            {{ include.icon }}
        </div>
        <div class="min-w-0">
            {% if include.badge %}
            <p class="enterprise-badge mb-2">{{ include.badge }}</p>
            {% endif %}
            <h3 class="text-lg font-semibold text-[#1a2b4c] leading-snug">{{ include.title }}</h3>
        </div>
    </div>
    <p class="text-slate-600 text-sm leading-relaxed mb-3 flex-grow">{{ include.description }}</p>
    {% if include.problem %}
    <p class="text-xs text-slate-500 mb-4"><span class="font-semibold text-slate-600">Problem:</span> {{ include.problem }}</p>
    {% endif %}
    <a href="{{ include.url | relative_url }}" class="text-blue-600 hover:text-blue-800 text-sm font-medium no-underline mt-auto">Learn more →</a>
</div>
