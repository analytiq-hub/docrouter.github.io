        <img src="{{ '/assets/images/extractions.png' | relative_url }}"

             class="w-full h-auto block">

    <div class="overflow-hidden rounded-lg{% if include.frame != 'none' %} border border-slate-200{% endif %}">

             alt="DocRouter processing flow"
             class="w-full h-auto block">
    </div>
</div>
