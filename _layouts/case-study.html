---
layout: default
---
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
  <div class="flex flex-col lg:flex-row gap-10">
    <main class="lg:w-0 lg:flex-1 min-w-0">
      <article class="h-entry" itemscope itemtype="http://schema.org/Article">
        <header class="mb-8 pb-8 border-b border-slate-200">
          <a href="{{ '/case-studies/' | relative_url }}" class="text-sm font-medium text-blue-600 hover:text-blue-800 no-underline mb-4 inline-block">← All case studies</a>
          <h1 class="text-3xl md:text-4xl font-bold text-[#1a2b4c] mb-4 p-name leading-tight" itemprop="name headline">{{ page.title | escape }}</h1>
          {%- if page.subtitle -%}
            <p class="text-lg text-slate-600 mb-0 max-w-3xl">{{ page.subtitle | escape }}</p>
          {%- endif -%}
        </header>

        <div class="prose prose-slate prose-lg max-w-3xl case-study-prose e-content" itemprop="articleBody">
          {{ content }}
        </div>

        <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
      </article>
    </main>

    <aside class="hidden lg:block w-72 flex-shrink-0">
      <div class="sticky top-24 enterprise-card p-5">
        {% include case-study-toc.html %}
      </div>
    </aside>
  </div>
</div>
